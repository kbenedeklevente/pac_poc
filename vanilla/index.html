<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abandoned Lab — Vanilla Canvas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a15;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: monospace;
      color: #ccc;
    }
    h1 {
      margin-bottom: 8px;
      font-size: 18px;
      color: #57cc99;
    }
    .subtitle {
      margin-bottom: 16px;
      font-size: 12px;
      color: #666;
    }
    canvas {
      border: 2px solid #2a2a4e;
      cursor: default;
      image-rendering: pixelated;
    }
    .back-link {
      margin-top: 16px;
      color: #57cc99;
      text-decoration: none;
      font-size: 13px;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Abandoned Lab — Vanilla Canvas</h1>
  <p class="subtitle">0 KB framework | Canvas2D | Pixel-level dissolve effect</p>
  <canvas id="game" width="960" height="640"></canvas>
  <a class="back-link" href="../">Back to comparison</a>
  <script type="module" src="main.js"></script>
</body>
</html>
